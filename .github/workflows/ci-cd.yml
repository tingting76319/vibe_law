name: Legal-RAG CI/CD

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  API_URL: http://localhost:3000

jobs:
  # 0. Smoke Test - 快速檢查
  smoke-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix backend

      - name: Start backend server
        run: |
          cd backend
          npm start &
          sleep 5

      - name: Run Smoke Test
        run: |
          cd backend
          npx vitest run tests/smoke.test.js
        env:
          API_URL: http://localhost:3000

  # 1. Lint 檢查
  lint:
    runs-on: ubuntu-latest
    needs: smoke-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

  # 2. 單元測試 + Coverage
  unit-test:
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix backend

      - name: Run backend unit tests
        run: npm run test:run
        env:
          CI: true

  # 3. Integration Tests
  integration-test:
    runs-on: ubuntu-latest
    needs: unit-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix backend

      - name: Start backend server
        run: |
          cd backend
          npm start &
          sleep 5

      - name: Run Integration Tests
        run: |
          cd backend
          npx vitest run tests/upload.test.js
        env:
          API_URL: http://localhost:3000

  # 4. Coverage Gate
  coverage-gate:
    runs-on: ubuntu-latest
    needs: integration-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix backend

      - name: Run Coverage
        run: |
          cd backend
          npm run test:coverage
        env:
          CI: true
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 7

  # 5. Build
  build:
    runs-on: ubuntu-latest
    needs: coverage-gate
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build || echo "No build script"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: legal-rag-build
          path: .
          retention-days: 7
